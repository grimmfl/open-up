name: Build Release

permissions:
  contents: write
  statuses: write
  checks: write

on:
  push:
    tags:
      - '*'

  workflow_dispatch:

env:
  SIGNALING_URL: ${{ secrets.SIGNALING_URL }}

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows.yml
    secrets: inherit
  build-mac:
    uses: ./.github/workflows/build-mac.yml
    secrets: inherit

